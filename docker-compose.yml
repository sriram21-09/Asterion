services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8001:8000"
    environment:
      - ENV=development
      - PORT=8000
    volumes:
      - ./backend:/app
      - ./datasets:/app/datasets
      - ./scientific:/app/scientific
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Browser-side API URL (client requests from host browser to host-mapped port)
      - VITE_API_URL=http://localhost:8001/api/v1
      # Server-side / SSR API URL (container-to-container via Docker network)
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { res.statusCode === 200 ? process.exit(0) : process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
