name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend unit tests (inside backend/) ──────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
    - name: Run backend tests
      env:
        PYTHONPATH: ..
      run: |
        cd backend
        pytest

  # ── Root-level integration & scientific tests ─────────────────────────
  root-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx pyyaml
    - name: Run root test suite
      env:
        PYTHONPATH: .:backend
      run: |
        pytest tests/ -v

  # ── Ruff format & lint check ──────────────────────────────────────────
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install ruff
      run: pip install ruff
    - name: Run ruff linter
      run: ruff check backend/ scientific/ tests/
    - name: Run ruff format check
      run: ruff format --check backend/ scientific/ tests/

  # ── Mypy static type check ───────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy
    - name: Run mypy
      env:
        PYTHONPATH: .:backend
      run: mypy backend/app/ --ignore-missing-imports

  # ── Frontend lint & build ─────────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Run lint and build
      run: |
        cd frontend
        npm run lint
        npm run build
